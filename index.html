<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balık 3D Modelleri</title>
    <!-- Model-viewer kütüphanesini dahil ediyoruz -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.3.0/model-viewer.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            /* Arka plan PNG dosyanı buraya ekledik */
            background-image: url('1784336158192.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            font-family: sans-serif;
            min-height: 100vh;
        }
        
        /* Arka plan resminin üzerinde modellerin net görünmesi için karanlık filtre */
        .overlay {
            background-color: rgba(0, 0, 0, 0.6);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            margin-top: 20px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
            width: 100%;
            max-width: 1200px;
            margin-top: 20px;
        }

        .model-card {
            /* Yarı saydam cam efekti (Glassmorphism) */
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            flex: 1;
            min-width: 300px;
        }

        model-viewer {
            width: 100%;
            height: 400px;
            background-color: transparent; /* Modelin arkası saydam olsun ki PNG görünsün */
            border-radius: 8px;
            outline: none;
        }

        h2 {
            text-align: center;
            margin-top: 0;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <div class="overlay">
        <h1>3D Balık Modelleri</h1>

        <div class="container">
            <!-- Birinci Model: fishe.glb -->
            <div class="model-card">
                <h2>Fishe</h2>
                <model-viewer 
                    src="fishe.glb" 
                    alt="Fishe 3D Model" 
                    auto-rotate 
                    camera-controls 
                    shadow-intensity="1">
                </model-viewer>
            </div>

            <!-- İkinci Model: remora.glb -->
            <div class="model-card">
                <h2>Remora</h2>
                <model-viewer 
                    src="remora.glb" 
                    alt="Remora 3D Model" 
                    auto-rotate 
                    camera-controls 
                    shadow-intensity="1">
                </model-viewer>
            </div>
        </div>
    </div>

</body>
</html>
