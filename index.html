<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yüzen Balıklar</title>
    <!-- Model-viewer kütüphanesi -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.3.0/model-viewer.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden; /* Yanlışlıkla sayfa kaymasını engeller */
            /* Arka plan ayarları */
            background-image: url('1784336158192.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .ocean {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            gap: 20px;
        }

        model-viewer {
            width: 45vw; /* Ekranda kaplayacakları alan (daha makul bir boyut) */
            height: 80vh;
            background-color: transparent; /* Arka plan tamamen şeffaf */
            outline: none;
        }
    </style>
</head>
<body>

    <div class="ocean">
        <!-- Birinci Balık: autoplay eklendi, gölgeler kaldırıldı -->
        <model-viewer 
            src="fishe.glb" 
            autoplay 
            auto-rotate 
            rotation-per-second="10deg"
            camera-controls 
            shadow-intensity="0"
            disable-zoom>
        </model-viewer>

        <!-- İkinci Balık: autoplay eklendi, gölgeler kaldırıldı -->
        <model-viewer 
            src="remora.glb" 
            autoplay 
            auto-rotate 
            rotation-per-second="10deg"
            camera-controls 
            shadow-intensity="0"
            disable-zoom>
        </model-viewer>
    </div>

</body>
</html>
