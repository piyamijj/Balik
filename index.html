<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">

    <title>Yapay Zekalı Akvaryum Ekosistemi</title>
    <style>

            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxOTIwIiBoZWlnaHQ9IjEwODAiIHZpZXdCb3g9IjAgMCAxOTIwIDEwODAiIHByZXNlcnZlQXNwZWN0UmF0aW89Im5vbmUiPgogICAgPGRlZnM+CiAgICAgICAgPGxpbmVhckdyYWRpZW50IGlkPSJ3YXRlckdyYWQiIHgxPSIwJSIgeTE9IjAlIiB4Mj0iMCUiIHkyPSIxMDAlIj4KICAgICAgICAgICAgPHN0b3Agb2Zmc2V0PSIwJSIgc3RvcC1jb2xvcj0iIzAwOGZiMyIgLz4KICAgICAgICAgICAgPHN0b3Agb2Zmc2V0PSI2MCUiIHN0b3AtY29sb3I9IiMwMDViODIiIC8+CiAgICAgICAgICAgIDxzdG9wIG9mZnNldD0iMTAwJSIgc3RvcC1jb2xvcj0iIzAwMWUzNiIgLz4KICAgICAgICA8L2xpbmVhckdyYWRpZW50PgogICAgPC9kZWZzPgogICAgPHJlY3Qgd2lkdGg9IjEwMCUiIGhlaWdodD0iMTAwJSIgZmlsbD0idXJsKCN3YXRlckdyYWQpIiAvPgogICAgPCEtLSBLdW0gemVtaW4gLS0+CiAgICA8cGF0aCBkPSJNMCw5MDAgUTQ4MCw4NTAgOTYwLDk1MCBUMTkyMCw5MDAgTDE5MjAsMTA4MCBMMCwxMDgwIFoiIGZpbGw9IiNiMDljNmYiIC8+CiAgICA8cGF0aCBkPSJNMCw5NTAgUTMwMCw5MDAgODAwLDEwMDAgVDE5MjAsOTgwIEwxOTIwLDEwODAgTDAsMTA4MCBaIiBmaWxsPSIjOGI3YjU3IiBvcGFjaXR5PSIwLjYiLz4KICAgIDwhLS0gQmFzaXQga2F5YWxhciAtLT4KICAgIDxwYXRoIGQ9Ik0xNTAsMTAwMCBRMjUwLDg1MCA0MDAsMTAwMCBaIiBmaWxsPSIjM2E0YjVjIiAvPgogICAgPHBhdGggZD0iTTE0MDAsMTA1MCBRMTYwMCw3NTAgMTgwMCwxMDUwIFoiIGZpbGw9IiMyYzNhNDciIC8+CiAgICA8cGF0aCBkPSJNMTIwMCwxMDIwIFExMzAwLDkwMCAxNDUwLDEwMjAgWiIgZmlsbD0iIzRiNWQ2ZSIgLz4KPC9zdmc+') no-repeat center center fixed; 
            background-size: cover;
            touch-action: none;
        }

        .light-rays {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.15) 0%, rgba(0,0,0,0.4) 100%);
            pointer-events: none;
            z-index: 0;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        
        .bilgi {
            position: absolute;
            top: 15px;
            left: 15px;
            color: rgba(255,255,255,0.7);
            font-family: Arial, sans-serif;
            font-size: 14px;
            z-index: 2;
            pointer-events: none;
            text-shadow: 1px 1px 2px black;
        }
    </style>
</head>
<body>

    <div class="light-rays"></div>
    <div class="bilgi">Ekrana dokunarak yem atın. Balıklar yedikçe büyür ve yumurtlar.</div>
    <canvas id="akvaryum"></canvas>

    <script>
        const canvas = document.getElementById('akvaryum');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Görselleri Yükle
        const balikResmi = new Image();
        balikResmi.src = 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj4KICAgIDxwYXRoIGQ9Ik0gODUsNTAgTCAxMDAsMjAgTCA5MCw1MCBMIDEwMCw4MCBaIiBmaWxsPSIjZmZjYzAwIiBzdHJva2U9IiMzMzMiIHN0cm9rZS13aWR0aD0iMSIgLz4KICAgIDxwYXRoIGQ9Ik0gODUsNTAgTCA5NSwzNSBMIDkwLDUwIEwgOTUsNjUgWiIgZmlsbD0iIzAwMCIgLz4KICAgIDxlbGxpcHNlIGN4PSI1MCIgY3k9IjUwIiByeD0iMzgiIHJ5PSIyNiIgZmlsbD0iI2ZmZiIgc3Ryb2tlPSIjMzMzIiBzdHJva2Utd2lkdGg9IjEiIC8+CiAgICA8cGF0aCBkPSJNIDQwLDI2IFEgNTAsNTAgNDAsNzQgTCA1NSw3NSBRIDY1LDUwIDU1LDI1IFoiIGZpbGw9IiMwMDAiIC8+CiAgICA8cGF0aCBkPSJNIDY1LDMwIFEgNzUsNTAgNjUsNzAgTCA3NSw2NSBRIDgwLDUwIDc1LDM1IFoiIGZpbGw9IiNmZmNjMDAiIC8+CiAgICA8cGF0aCBkPSJNIDUwLDI0IFEgNDAsNSAyMCwwIFEgMzAsMTUgNDAsMjUgWiIgZmlsbD0iI2ZmZiIgc3Ryb2tlPSIjMDAwIiBzdHJva2Utd2lkdGg9IjEiLz4KICAgIDxwYXRoIGQ9Ik0gNTAsNzYgUSA0MCw5MCAzMCw5NSBRIDM1LDg1IDQ1LDc1IFoiIGZpbGw9IiMwMDAiIC8+CiAgICA8cGF0aCBkPSJNIDMwLDMwIFEgMTAsNTAgMzAsNzAgWiIgZmlsbD0iI2ZmY2MwMCIgLz4KICAgIDxjaXJjbGUgY3g9IjIyIiBjeT0iNDUiIHI9IjQiIGZpbGw9IiMwMDAiIC8+CiAgICA8Y2lyY2xlIGN4PSIyMSIgY3k9IjQ0IiByPSIxLjUiIGZpbGw9IiNmZmYiIC8+CiAgICA8cGF0aCBkPSJNIDEyLDUwIFEgOCw1MCAxMiw1NCBaIiBmaWxsPSIjMzMzIiAvPgogICAgPHBhdGggZD0iTSA0NSw1NSBRIDM1LDY1IDUwLDY1IFoiIGZpbGw9IiNmZmNjMDAiIHN0cm9rZT0iIzAwMCIgc3Ryb2tlLXdpZHRoPSIxIi8+Cjwvc3ZnPg==';

        const yumurtaResmi = new Image();
        yumurtaResmi.src = 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA1MCA1MCI+CiAgICA8ZWxsaXBzZSBjeD0iMjUiIGN5PSIyNSIgcng9IjE2IiByeT0iMjIiIGZpbGw9IiNmZmI2YzEiIG9wYWNpdHk9IjAuOCIgLz4KICAgIDxjaXJjbGUgY3g9IjI1IiBjeT0iMjgiIHI9IjYiIGZpbGw9IiNmZjY5YjQiIG9wYWNpdHk9IjAuNiIvPgogICAgPGVsbGlwc2UgY3g9IjIwIiBjeT0iMTUiIHJ4PSI1IiByeT0iOCIgZmlsbD0iI2ZmZiIgb3BhY2l0eT0iMC43IiB0cmFuc2Zvcm09InJvdGF0ZSgtMzAgMjAgMTUpIiAvPgogICAgPGVsbGlwc2UgY3g9IjMyIiBjeT0iMzUiIHJ4PSIyIiByeT0iNCIgZmlsbD0iI2ZmZiIgb3BhY2l0eT0iMC40IiB0cmFuc2Zvcm09InJvdGF0ZSgtNDUgMzIgMzUpIiAvPgo8L3N2Zz4=';

        const yemler = [];
        const yumurtalar = [];
        const baliklar = [];

        const YETISKIN_BOYUT = 90; 
        const YAVRU_BOYUT = 30;
        const YUMURTLAMA_SINIRI = 3; 
        const BUYUME_HIZI = 20; 

        // Yem Sınıfı
        class Yem {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.boyut = 4;
                this.hizY = 1.5;
                this.aktif = true;
            }
            guncelle() {
                this.y += this.hizY;
                if (this.y > canvas.height) this.aktif = false;
            }
            ciz() {
                ctx.fillStyle = '#D2B48C';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.boyut, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Yumurta Sınıfı
        class Yumurta {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.boyut = 20;
                this.hizY = 2;
                this.catlamaSuresi = 180; 
                this.aktif = true;
            }
            guncelle() {
                if (this.y < canvas.height - 40) {
                    this.y += this.hizY; 
                } else {
                    this.catlamaSuresi--; 
                    if (this.catlamaSuresi <= 0) {
                        this.aktif = false;
                        baliklar.push(new Balik(this.x, this.y, true)); 
                    }
                }
            }
            ciz() {
                ctx.drawImage(yumurtaResmi, this.x - this.boyut/2, this.y - this.boyut/2, this.boyut, this.boyut);
            }
        }

        // Akıllı Balık Sınıfı
        class Balik {
            constructor(x, y, yavruMu = false) {
                this.x = x;
                this.y = y;
                this.boyut = yavruMu ? YAVRU_BOYUT : YETISKIN_BOYUT;
                this.yetiskinMi = !yavruMu;
                this.yenenYem = 0;
                this.vx = (Math.random() - 0.5) * 3;
                this.vy = (Math.random() - 0.5) * 2;
                this.hiz = yavruMu ? 3.5 : 2.5; 
            }

            guncelle() {
                let hedef = null;
                let enKisaMesafe = Infinity;

                for (let yem of yemler) {
                    if (yem.aktif) {
                        let mesafe = Math.hypot(yem.x - this.x, yem.y - this.y);
                        if (mesafe < enKisaMesafe) {
                            enKisaMesafe = mesafe;
                            hedef = yem;
                        }
                    }
                }

                if (hedef) {
                    let dx = hedef.x - this.x;
                    let dy = hedef.y - this.y;
                    
                    if (enKisaMesafe < this.boyut / 2) {
                        hedef.aktif = false; 
                        this.yemYedi();
                    } else {
                        this.vx = (dx / enKisaMesafe) * this.hiz;
                        this.vy = (dy / enKisaMesafe) * this.hiz;
                    }
                } else {
                    if (Math.random() < 0.02) {
                        this.vx += (Math.random() - 0.5) * 1;
                        this.vy += (Math.random() - 0.5) * 1;
                        
                        let mevcutHiz = Math.hypot(this.vx, this.vy);
                        this.vx = (this.vx / mevcutHiz) * this.hiz;
                        this.vy = (this.vy / mevcutHiz) * this.hiz;
                    }
                }

                this.x += this.vx;
                this.y += this.vy;

                if (this.x > canvas.width - this.boyut/2) this.vx *= -1;
                if (this.x < this.boyut/2) this.vx *= -1;
                if (this.y > canvas.height - this.boyut/2) this.vy *= -1;
                if (this.y < this.boyut/2) this.vy *= -1;
            }

            yemYedi() {
                this.yenenYem++;
                if (!this.yetiskinMi) {
                    this.boyut += BUYUME_HIZI;
                    if (this.boyut >= YETISKIN_BOYUT) {
                        this.yetiskinMi = true;
                        this.boyut = YETISKIN_BOYUT;
                        this.yenenYem = 0; 
                    }
                } else {
                    if (this.yenenYem >= YUMURTLAMA_SINIRI) {
                        yumurtalar.push(new Yumurta(this.x, this.y));
                        this.yenenYem = 0; 
                    }
                }
            }

            ciz() {
                ctx.save();
                ctx.translate(this.x, this.y);
                
                if (this.vx > 0) {
                    ctx.scale(-1, 1);
                }
                
                ctx.drawImage(balikResmi, -this.boyut / 2, -this.boyut / 2, this.boyut, this.boyut);
                ctx.restore();
            }
        }

        let resimSayisi = 0;
        function baslat() {
            resimSayisi++;
            if (resimSayisi === 2) {
                baliklar.push(new Balik(canvas.width/3, canvas.height/2, false));
                baliklar.push(new Balik(canvas.width/1.5, canvas.height/2, false));
                animasyon();
            }
        }
        
        balikResmi.onload = baslat;
        yumurtaResmi.onload = baslat;

        function yemAt(e) {
            let x = e.clientX || (e.touches && e.touches[0].clientX);
            let y = e.clientY || (e.touches && e.touches[0].clientY);
            if (x === undefined || y === undefined) return;
            yemler.push(new Yem(x, y));
        }

        window.addEventListener('click', yemAt);
        window.addEventListener('touchstart', yemAt);

        function animasyon() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = yumurtalar.length - 1; i >= 0; i--) {
                if (yumurtalar[i].aktif) {
                    yumurtalar[i].guncelle();
                    yumurtalar[i].ciz();
                } else {
                    yumurtalar.splice(i, 1);
                }
            }

            for (let i = yemler.length - 1; i >= 0; i--) {
                if (yemler[i].aktif) {
                    yemler[i].guncelle();
                    yemler[i].ciz();
                } else {
                    yemler.splice(i, 1);
                }
            }

            baliklar.forEach(balik => {
                balik.guncelle();
                balik.ciz();
            });

            requestAnimationFrame(animasyon);
        }
    </script>
</body>
</html>
